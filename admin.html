<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Dashboard - Minerva Printers</title>
    <link rel="shortcut icon" href="image/Logo.png" type="image/x-icon">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0b2e 50%, #0f0c3a 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Admin Navbar */
        .admin-nav {
            background: rgba(15, 15, 45, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .admin-nav h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Main Container */
        .admin-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.2);
            text-align: center;
        }

        .stat-card i {
            font-size: 2rem;
            color: #c084fc;
            margin-bottom: 0.5rem;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #c084fc;
        }

        /* Action Buttons */
        .action-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn-add {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-export {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid #8b5cf6;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            color: #c084fc;
            font-weight: 600;
            cursor: pointer;
        }

        /* Products Table - FIXED ROW HEIGHT */
        .products-table {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid rgba(139, 92, 246, 0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* Fixed row height - all rows exactly 85px */
        .products-table tbody tr {
            height: 85px;
            max-height: 85px;
            min-height: 85px;
        }

        .products-table td {
            padding: 8px 15px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            vertical-align: middle;
            height: 85px;
            max-height: 85px;
            min-height: 85px;
        }

        .products-table th {
            padding: 15px;
            text-align: left;
            color: #c084fc;
            font-weight: 600;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }

        /* Fixed image size - 55x55 pixels */
        .table-product-img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .table-placeholder-icon {
            font-size: 35px;
            opacity: 0.5;
            display: block;
            text-align: center;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .edit-btn, .delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 1rem;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn {
            color: #60a5fa;
        }

        .delete-btn {
            color: #ef4444;
        }

        .edit-btn:hover {
            background: rgba(96, 165, 250, 0.2);
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 900px;
            width: 100%;
            background: linear-gradient(135deg, rgba(15, 15, 45, 0.98), rgba(26, 11, 46, 0.98));
            border-radius: 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            color: #c084fc;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 0.5rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .form-group select option {
            background: #1a0b2e;
            color: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .category-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .category-group select {
            flex: 2;
        }

        .category-group input {
            flex: 1;
        }

        /* Multiple Images Upload */
        .multi-image-upload {
            border: 2px dashed rgba(139, 92, 246, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .multi-image-upload:hover {
            border-color: #c084fc;
            background: rgba(139, 92, 246, 0.05);
        }

        .image-preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 0.5rem;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-img {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            color: white;
        }

        /* Variants Section */
        .variants-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .variant-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 0.8rem;
            align-items: center;
        }

        .variant-card input {
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 0.4rem;
            color: #fff;
        }

        .variant-card input[type="color"] {
            width: 50px;
            height: 40px;
            cursor: pointer;
        }

        .btn-upload-variant {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid #8b5cf6;
            padding: 0.5rem;
            border-radius: 0.4rem;
            color: #c084fc;
            cursor: pointer;
            font-size: 0.75rem;
            text-align: center;
            width: 100%;
        }

        .remove-variant {
            background: #ef4444;
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 0.4rem;
            cursor: pointer;
        }

        .btn-add-variant {
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid #8b5cf6;
            padding: 0.6rem;
            border-radius: 0.5rem;
            color: #c084fc;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }

        /* Modal Buttons */
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-save {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 0.8rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #ef4444;
            padding: 0.8rem;
            border-radius: 0.5rem;
            color: #ef4444;
            cursor: pointer;
            flex: 1;
        }

        /* Toast Notification */
        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        .toast-success {
            background: #10b981;
            color: white;
        }

        .toast-error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-container {
                padding: 0 1rem;
            }
            .variant-card {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .modal-content {
                padding: 1rem;
            }
            .category-group {
                flex-direction: column;
            }
            .category-group select, .category-group input {
                width: 100%;
            }
            .admin-nav {
                padding: 0.8rem 1rem;
            }
            .admin-nav h1 {
                font-size: 1.2rem;
            }
            .products-table td {
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Admin Navbar -->
    <nav class="admin-nav">
        <h1><i class="fas fa-crown"></i> Minerva Printers - Admin Dashboard</h1>
        <div>
            <span style="margin-right: 1rem; color: #c084fc;"><i class="fas fa-user-shield"></i> Admin</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-boxes"></i>
                <div class="number" id="totalProducts">0</div>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-tags"></i>
                <div class="number" id="totalCategories">0</div>
                <p>Categories</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-image"></i>
                <div class="number" id="totalImages">0</div>
                <p>Product Images</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-bar">
            <button class="btn-add" onclick="openAddModal()">
                <i class="fas fa-plus"></i> Add New Product
            </button>
            <button class="btn-export" onclick="exportData()">
                <i class="fas fa-download"></i> Export Products (JSON)
            </button>
        </div>

        <!-- Products Table -->
        <div class="products-table">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Variants</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="6" style="text-align: center; padding: 40px;">Loading products...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Product</h2>
            
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="productName" placeholder="e.g., Elegant Wedding Invitation">
            </div>
            
            <div class="form-group">
                <label>Category *</label>
                <div class="category-group">
                    <select id="productCategory">
                        <option value="">Select Category</option>
                        <option value="Wedding Card">Wedding Card</option>
                        <option value="Business Cards">Business Cards</option>
                        <option value="Invitation Card">Invitation Card</option>
                        <option value="ID Card">ID Card</option>
                        <option value="Election">Election</option>
                        <option value="Calendars">Calendars</option>
                        <option value="Banners">Banners</option>
                        <option value="Labels & Stickers">Labels & Stickers</option>
                        <option value="Certificates">Certificates & Manapatra</option>
                        <option value="Others">Others</option>
                    </select>
                    <input type="text" id="newCategory" placeholder="Or type new category">
                </div>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="productDescription" placeholder="Product description..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Base Price (₹ per piece) *</label>
                <input type="number" id="productPrice" step="0.01" placeholder="20">
            </div>
            
            <div class="form-group">
                <label>Printing Cost (₹ per piece)</label>
                <input type="number" id="printingCost" step="0.01" placeholder="8">
            </div>
            
            <div class="form-group">
                <label>Packaging Cost (₹ per piece)</label>
                <input type="number" id="packagingCost" step="0.01" placeholder="2">
            </div>
            
            <div class="form-group">
                <label>GST (%)</label>
                <input type="number" id="gst" step="0.01" placeholder="18">
            </div>
            
            <!-- Multiple Images Upload -->
            <div class="form-group">
                <label>Product Images (Multiple)</label>
                <div class="multi-image-upload" onclick="document.getElementById('imageUpload').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem;"></i>
                    <p>Click to upload multiple images</p>
                    <input type="file" id="imageUpload" multiple accept="image/*" style="display: none;" onchange="handleImageUpload(this.files)">
                </div>
                <div id="imagePreviewGrid" class="image-preview-grid"></div>
                <input type="hidden" id="productImages" value="[]">
            </div>
            
            <!-- Color Variants Section -->
            <div class="variants-section">
                <label>Color Variants</label>
                <div id="variantsList"></div>
                <button type="button" class="btn-add-variant" onclick="addVariant()">
                    <i class="fas fa-plus"></i> Add Color Variant
                </button>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveProduct()">Save Product</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        // IMPORTANT: Replace these with your actual GitHub details
        const GITHUB_TOKEN = "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";
        const REPO_OWNER = "theprabir";
        const REPO_NAME = "Minerva-Printers";
        
        let products = [];
        let editingProductId = null;
        let tempVariants = [];
        
        // ========== SIMPLE PASSWORD PROTECTION ==========
        const ADMIN_PASSWORD = "Minerva2025!";
        
        function checkAuth() {
            const entered = prompt("Enter admin password:");
            if (entered !== ADMIN_PASSWORD) {
                window.location.href = "index.html";
            }
        }
        checkAuth();
        
        function logout() {
            window.location.href = "index.html";
        }
        
        // ========== TOAST NOTIFICATION ==========
        let toastTimeout = null;
        
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast-message');
            if (existingToast) existingToast.remove();
            if (toastTimeout) clearTimeout(toastTimeout);
            
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            
            toastTimeout = setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ========== LOAD PRODUCTS ==========
        async function loadProducts() {
            try {
                const response = await fetch('products.json?' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    products = data.products || [];
                } else {
                    products = [];
                }
                updateStats();
                renderProductsTable();
            } catch (error) {
                console.error("Error loading products:", error);
                products = [];
                renderProductsTable();
            }
        }
        
        function updateStats() {
            document.getElementById('totalProducts').innerText = products.length;
            const categories = [...new Set(products.map(p => p.category))];
            document.getElementById('totalCategories').innerText = categories.length;
            let totalImages = 0;
            products.forEach(p => {
                if (p.images) totalImages += p.images.length;
                else if (p.imageURL) totalImages += 1;
            });
            document.getElementById('totalImages').innerText = totalImages;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderProductsTable() {
            const tbody = document.getElementById('productsTableBody');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">No products found. Click "Add New Product" to get started.</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map(product => `
                <tr>
                    <td style="text-align: center; vertical-align: middle;">
                        ${product.images && product.images.length > 0 ? 
                            `<img src="${product.images[0]}" alt="${escapeHtml(product.name)}" class="table-product-img">` :
                            product.imageURL ? 
                            `<img src="${product.imageURL}" alt="${escapeHtml(product.name)}" class="table-product-img">` :
                            '<i class="fas fa-image table-placeholder-icon"></i>'
                        }
                    </td>
                    <td style="vertical-align: middle;"><strong>${escapeHtml(product.name)}</strong></td>
                    <td style="vertical-align: middle;">${escapeHtml(product.category)}</td>
                    <td style="vertical-align: middle;">₹${product.price}</td>
                    <td style="vertical-align: middle; text-align: center;">${product.variants ? product.variants.length : 0}</td>
                    <td style="vertical-align: middle;">
                        <div class="action-buttons">
                            <button class="edit-btn" onclick="openEditModal('${product.id}')"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteProduct('${product.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function getSelectedCategory() {
            const select = document.getElementById('productCategory');
            const newCategory = document.getElementById('newCategory').value.trim();
            if (newCategory) return newCategory;
            return select.value;
        }
        
        // ========== IMAGE UPLOAD TO GITHUB ==========
        async function uploadImageToGitHub(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = async function() {
                    const base64Content = reader.result.split(',')[1];
                    const timestamp = Date.now();
                    const safeFileName = `${timestamp}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                    const imagePath = `image/products/${safeFileName}`;
                    
                    try {
                        const uploadResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${imagePath}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${GITHUB_TOKEN}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Upload product image: ${safeFileName}`,
                                content: base64Content,
                                branch: 'main'
                            })
                        });
                        
                        if (!uploadResponse.ok) throw new Error('Upload failed');
                        const result = await uploadResponse.json();
                        const imageUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${imagePath}`;
                        resolve(imageUrl);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        async function handleImageUpload(files) {
            const imageUrls = JSON.parse(document.getElementById('productImages').value || '[]');
            const previewGrid = document.getElementById('imagePreviewGrid');
            
            for (const file of files) {
                previewGrid.innerHTML += `<div class="preview-item"><i class="fas fa-spinner fa-spin"></i> Uploading...</div>`;
                try {
                    const url = await uploadImageToGitHub(file);
                    imageUrls.push(url);
                    document.getElementById('productImages').value = JSON.stringify(imageUrls);
                } catch (error) {
                    showToast(`Failed to upload ${file.name}`, 'error');
                }
            }
            refreshImagePreview();
        }
        
        function refreshImagePreview() {
            const imageUrls = JSON.parse(document.getElementById('productImages').value || '[]');
            const previewGrid = document.getElementById('imagePreviewGrid');
            previewGrid.innerHTML = imageUrls.map((url, index) => `
                <div class="preview-item">
                    <img src="${url}" alt="Preview">
                    <div class="remove-img" onclick="removeImage(${index})">×</div>
                </div>
            `).join('');
        }
        
        function removeImage(index) {
            const imageUrls = JSON.parse(document.getElementById('productImages').value || '[]');
            imageUrls.splice(index, 1);
            document.getElementById('productImages').value = JSON.stringify(imageUrls);
            refreshImagePreview();
        }
        
        // ========== VARIANTS MANAGEMENT ==========
        function addVariant() {
            const container = document.getElementById('variantsList');
            const variantIndex = tempVariants.length;
            tempVariants.push({ color: "", colorCode: "#8b5cf6", imageURL: "", price: null });
            
            const variantDiv = document.createElement('div');
            variantDiv.className = 'variant-card';
            variantDiv.id = `variant-${variantIndex}`;
            variantDiv.innerHTML = `
                <input type="text" placeholder="Color name" onchange="updateVariant(${variantIndex}, 'color', this.value)">
                <input type="color" value="#8b5cf6" onchange="updateVariant(${variantIndex}, 'colorCode', this.value)">
                <div>
                    <input type="file" accept="image/*" onchange="uploadVariantImage(${variantIndex}, this.files[0])" style="display: none;" id="variantImageInput_${variantIndex}">
                    <button type="button" class="btn-upload-variant" onclick="document.getElementById('variantImageInput_${variantIndex}').click()">
                        <i class="fas fa-upload"></i> Upload Image
                    </button>
                    <div id="variantImagePreview_${variantIndex}" style="margin-top: 5px;"></div>
                </div>
                <input type="number" placeholder="Price (optional)" step="0.01" onchange="updateVariant(${variantIndex}, 'price', parseFloat(this.value))">
                <button class="remove-variant" onclick="removeVariant(${variantIndex})"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(variantDiv);
        }
        
        async function uploadVariantImage(index, file) {
            if (!file) return;
            
            const previewDiv = document.getElementById(`variantImagePreview_${index}`);
            previewDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            
            try {
                const imageUrl = await uploadImageToGitHub(file);
                tempVariants[index].imageURL = imageUrl;
                previewDiv.innerHTML = `<img src="${imageUrl}" style="max-width: 50px; max-height: 50px; border-radius: 5px;"> <span style="color: #4ade80;">✓</span>`;
            } catch (error) {
                previewDiv.innerHTML = '<span style="color: #ef4444;">❌ Failed</span>';
            }
        }
        
        function updateVariant(index, field, value) {
            if (tempVariants[index]) {
                tempVariants[index][field] = value;
            }
        }
        
        function removeVariant(index) {
            tempVariants.splice(index, 1);
            renderVariantsList();
        }
        
        function renderVariantsList() {
            const container = document.getElementById('variantsList');
            container.innerHTML = '';
            tempVariants.forEach((variant, idx) => {
                const variantDiv = document.createElement('div');
                variantDiv.className = 'variant-card';
                variantDiv.innerHTML = `
                    <input type="text" placeholder="Color name" value="${variant.color || ''}" onchange="updateVariant(${idx}, 'color', this.value)">
                    <input type="color" value="${variant.colorCode || '#8b5cf6'}" onchange="updateVariant(${idx}, 'colorCode', this.value)">
                    <div>
                        <input type="file" accept="image/*" onchange="uploadVariantImage(${idx}, this.files[0])" style="display: none;" id="variantImageInput_${idx}">
                        <button type="button" class="btn-upload-variant" onclick="document.getElementById('variantImageInput_${idx}').click()">
                            <i class="fas fa-upload"></i> ${variant.imageURL ? 'Change Image' : 'Upload Image'}
                        </button>
                        <div id="variantImagePreview_${idx}" style="margin-top: 5px;">
                            ${variant.imageURL ? `<img src="${variant.imageURL}" style="max-width: 50px; max-height: 50px; border-radius: 5px;">` : ''}
                        </div>
                    </div>
                    <input type="number" placeholder="Price (optional)" step="0.01" value="${variant.price || ''}" onchange="updateVariant(${idx}, 'price', parseFloat(this.value))">
                    <button class="remove-variant" onclick="removeVariant(${idx})"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(variantDiv);
            });
        }
        
        // ========== MODAL FUNCTIONS ==========
        function openAddModal() {
            editingProductId = null;
            document.getElementById('modalTitle').innerText = 'Add New Product';
            document.getElementById('productName').value = '';
            document.getElementById('productCategory').value = '';
            document.getElementById('newCategory').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('printingCost').value = '';
            document.getElementById('packagingCost').value = '';
            document.getElementById('gst').value = '';
            document.getElementById('productImages').value = '[]';
            document.getElementById('imagePreviewGrid').innerHTML = '';
            tempVariants = [];
            renderVariantsList();
            document.getElementById('productModal').classList.add('active');
        }
        
        function openEditModal(productId) {
            const product = products.find(p => p.id == productId);
            if (!product) return;
            
            editingProductId = productId;
            document.getElementById('modalTitle').innerText = 'Edit Product';
            document.getElementById('productName').value = product.name || '';
            document.getElementById('productCategory').value = product.category || '';
            document.getElementById('newCategory').value = '';
            document.getElementById('productDescription').value = product.description || '';
            document.getElementById('productPrice').value = product.price || '';
            document.getElementById('printingCost').value = product.printingCost || '';
            document.getElementById('packagingCost').value = product.packagingCost || '';
            document.getElementById('gst').value = product.gst || '';
            document.getElementById('productImages').value = JSON.stringify(product.images || []);
            refreshImagePreview();
            tempVariants = product.variants ? [...product.variants] : [];
            renderVariantsList();
            document.getElementById('productModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        // ========== SAVE PRODUCT ==========
        async function saveProduct() {
            const category = getSelectedCategory();
            if (!category) {
                showToast('Please select or enter a category', 'error');
                return;
            }
            
            const productData = {
                id: editingProductId || Date.now().toString(),
                name: document.getElementById('productName').value,
                category: category,
                description: document.getElementById('productDescription').value,
                price: parseFloat(document.getElementById('productPrice').value),
                printingCost: parseFloat(document.getElementById('printingCost').value) || 0,
                packagingCost: parseFloat(document.getElementById('packagingCost').value) || 0,
                gst: parseFloat(document.getElementById('gst').value) || 18,
                images: JSON.parse(document.getElementById('productImages').value || '[]'),
                variants: tempVariants.filter(v => v.color),
                createdAt: editingProductId ? undefined : new Date().toISOString()
            };
            
            if (!productData.name || !productData.category || !productData.price) {
                showToast('Please fill all required fields (Name, Category, Price)', 'error');
                return;
            }
            
            if (editingProductId) {
                const index = products.findIndex(p => p.id == editingProductId);
                products[index] = productData;
            } else {
                products.push(productData);
            }
            
            await saveProductsToGitHub();
            closeModal();
            loadProducts();
        }
        
        async function saveProductsToGitHub() {
            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify({ products: products }, null, 2))));
                
                let sha = null;
                try {
                    const checkResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/products.json`, {
                        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                    });
                    if (checkResponse.ok) {
                        const existing = await checkResponse.json();
                        sha = existing.sha;
                    }
                } catch (e) {}
                
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/products.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Update products",
                        content: content,
                        sha: sha,
                        branch: 'main'
                    })
                });
                
                if (!response.ok) throw new Error('Save failed');
                
                showToast('✅ Products saved successfully!', 'success');
                return true;
            } catch (error) {
                console.error(error);
                showToast('❌ Failed to save. Check your GitHub token.', 'error');
                return false;
            }
        }
        
        // ========== DELETE PRODUCT ==========
        async function deleteProduct(productId) {
            if (!confirm("Are you sure you want to delete this product?")) return;
            products = products.filter(p => p.id != productId);
            await saveProductsToGitHub();
            loadProducts();
        }
        
        // ========== EXPORT DATA ==========
        function exportData() {
            const dataStr = JSON.stringify({ products: products }, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `minerva_products_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Products exported successfully!', 'success');
        }
        
        // ========== INITIALIZE ==========
        loadProducts();
    </script>
</body>
</html>
