<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="shortcut icon" href="image/Logo.png" type="image/x-icon">
    <title>Products - Minerva Printers</title>
    <link rel="stylesheet" href="product.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Sticky Navbar with Search -->
    <nav class="navbar" id="navbar">
    <div class="nav-container">
        <div class="logo">
            <img src="image/Logo.png" alt="Minerva Printers" class="logo-image">
            <div class="logo-text">
                <h1>MINERVA PRINTERS</h1>
                <span class="tagline-small">Committed to keep commitment</span>
            </div>
        </div>
        
        <div class="nav-search">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" class="nav-search-input" placeholder="Search for wedding invitations...">
            </div>
        </div>
        
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </div>
</nav>

    <!-- Products Main Content -->
    <div class="products-main">
        <!-- Sidebar Filters -->
        <div class="filters-sidebar">
            <h3><i class="fas fa-filter"></i> Categories</h3>
            
            <div class="sort-box">
                <select id="sortOrder">
                    <option value="">Sort by: Default</option>
                    <option value="lowest">Price: Low to High</option>
                    <option value="highest">Price: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>
            
            <div class="category-list" id="categoryList">
                <!-- Categories will be dynamically inserted -->
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading products...
            </div>
        </div>
    </div>

    <!-- Product Detail Modal -->
<div id="productModal" class="modal">
    <div class="modal-close" id="modalClose">&times;</div>
    <div class="modal-content">
        <div class="modal-body" id="modalBody">
            <!-- Dynamic content will be injected here -->
        </div>
    </div>
</div>

<script src="product_page.js"></script>
</body>
</html>
